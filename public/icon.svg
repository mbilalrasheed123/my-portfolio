<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050508" />
      <stop offset="100%" stop-color="#111118" />
    </linearGradient>
    <!-- Glowing neon blue gradient -->
    <linearGradient id="neonBlue" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052d4" />
      <stop offset="50%" stop-color="#4364f7" />
      <stop offset="100%" stop-color="#6fb1fc" />
    </linearGradient>
    <!-- Glowing neon cyan gradient -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <!-- Drop shadow for the glowing effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background base rounded container (perfect for apps and maskable requirements) -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer ambient ring -->
  <rect x="24" y="24" width="464" height="464" rx="90" fill="none" stroke="url(#neonBlue)" stroke-width="4" stroke-opacity="0.25" />
  
  <g filter="url(#glow)">
    <!-- Tech styled braces and terminal console symbol -->
    <path d="M 170 140
             C 120 140, 110 180, 110 220
             L 110 240
             C 110 256, 90 256, 90 256
             C 110 256, 110 257, 110 272
             L 110 292
             C 110 332, 120 372, 170 372" 
          fill="none" 
          stroke="url(#neonBlue)" 
          stroke-width="18" 
          stroke-linecap="round" />

    <path d="M 342 140
             C 392 140, 402 180, 402 220
             L 402 240
             C 402 256, 422 256, 422 256
             C 402 256, 402 257, 402 272
             L 402 292
             C 402 332, 392 372, 342 372" 
          fill="none" 
          stroke="url(#neonBlue)" 
          stroke-width="18" 
          stroke-linecap="round" />

    <!-- Sleek futuristic 'B' / Infinite Node Monogram -->
    <path d="M 210 170 
             L 280 170 
             A 45 45 0 0 1 315 245
             A 45 45 0 0 1 275 325 
             L 210 325 
             Z" 
          fill="none" 
          stroke="url(#neonCyan)" 
          stroke-width="20" 
          stroke-linejoin="round" 
          stroke-linecap="round" />
          
    <path d="M 210 245 Z" 
          fill="none" 
          stroke="url(#neonCyan)" 
          stroke-width="20" 
          stroke-linecap="round" />
          
    <line x1="210" y1="247" x2="285" y2="247" stroke="url(#neonCyan)" stroke-width="18" stroke-linecap="round" />
  </g>

  <!-- Clean minor decorative accent points to make it look highly designed -->
  <circle cx="256" cy="110" r="8" fill="#00f2fe" opacity="0.8" />
  <circle cx="210" cy="325" r="10" fill="#00f2fe" />
  <circle cx="210" cy="170" r="10" fill="#4364f7" />
  <circle cx="210" cy="247" r="9" fill="#00f2fe" />
</svg>
