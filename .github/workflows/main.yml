name: Generate Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  generate-apk:
    name: Build Android Package (APK/AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Uses Microsoft's official PWABuilder engine to wrap your live, already deployed Vercel portfolio URL into a native installer APK
      - name: Convert PWA to Android Package (PWABuilder)
        uses: pwabuilder/pwa-action@v1
        with:
          pwa-url: "https://offibilal.vercel.app"
          package-name: "com.offibilal.portfolio"
          application-id: "com.offibilal.portfolio"
          app-name: "Bilal Rasheed Portfolio"
          manifest-url: "https://offibilal.vercel.app/manifest.json"

      # Upload the compiled release files so you can download them directly from GitHub Actions
      - name: Upload APK & AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bilal-Portfolio-Android-Installer
          path: |
            *.apk
            *.aab
            pwa-release/*.apk
            pwa-release/*.aab
            mvb-*.apk
            mvb-*.aab
            android-build/*.apk
            android-build/*.aab
          if-no-files-found: warn
