name: Build Android APK from PWA

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the Actions menu

jobs:
  build-pwa-to-apk:
    name: Build Android Package (APK/AAB)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Set up Node environment (needed for any pre-compilation checks)
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-size: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      # Use PWABuilder's official Github Action to bundle the PWA into a native APK/AAB wrapper
      - name: Convert PWA to Android Package (PWABuilder)
        uses: pwabuilder/github-action@v1
        with:
          # Your live, deployed portfolio URL
          pwa-url: "https://offibilal.vercel.app"
          
          # Details for the Android application wrapper
          package-name: "com.offibilal.portfolio"
          application-id: "com.offibilal.portfolio"
          app-name: "Bilal Rasheed Portfolio"
          manifest-url: "https://offibilal.vercel.app/manifest.json"

      # Upload the compiled release files so you can download them directly from GitHub
      - name: Upload Android Release Files
        uses: actions/upload-artifact@v4
        with:
          name: Bilal-Portfolio-Android-Build
          path: |
            *.apk
            *.aab
            pwa-release/*.apk
            pwa-release/*.aab
            mvb-*.apk
            mvb-*.aab
            android-build/*.apk
            android-build/*.aab
          if-no-files-found: warn
