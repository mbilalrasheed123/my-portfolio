name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build_apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Frontend Dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build React Web App
        run: npm run build
        env:
          VITE_API_BASE_URL: https://ais-dev-27dbl3sqrzznukp2d2muoj-520196975221.asia-southeast1.run.app

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor Web Assets to Android
        run: npx cap sync android

      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      - name: Build Android Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
