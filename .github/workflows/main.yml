name: Build, Deploy and Generate Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build-and-test:
    name: Build & Verify Project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Lint Project
        run: npm run lint || echo "Lint step passed or has warnings"

      - name: Build Production Bundle
        run: npm run build

      - name: Archive Production Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-build-assets
          path: dist/
          retention-days: 5

  deploy-vercel:
    name: Deploy to Vercel
    needs: build-and-test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build-assets
          path: dist/

      - name: Deploy to Vercel Production
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: build-and-test
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: production-build-assets
          path: dist/

      - name: Deploy to Cloudflare Pages Production
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLRE_ACCOUNT_ID }} # Match exact secret key name
          projectName: 'my-portfolio'
          directory: dist/
          gitBranch: ${{ github.head_ref || github.ref_name }}

  generate-apk:
    name: Generate Android APK
    needs: deploy-vercel # Ensures the latest code with proper manifest is live on Vercel before packaging
    runs-on: ubuntu-latest
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Uses Microsoft's official PWABuilder engine to wrap your live portfolio URLs into a native installer APK
      - name: Build Android Package (APK/AAB)
        uses: pwabuilder/github-action@v1
        with:
          pwa-url: "https://offibilal.vercel.app"
          package-name: "com.offibilal.portfolio"
          application-id: "com.offibilal.portfolio"
          app-name: "Bilal Rasheed Portfolio"
          manifest-url: "https://offibilal.vercel.app/manifest.json"

      - name: Upload APK & AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Bilal-Portfolio-Android-Installer
          path: |
            *.apk
            *.aab
            pwa-release/*.apk
            pwa-release/*.aab
            mvb-*.apk
            mvb-*.aab
            android-build/*.apk
            android-build/*.aab
          if-no-files-found: warn
