<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bilal Rasheed Portfolio</title>
    <link rel="preconnect" href="https://prod.spline.design" />
    <link rel="dns-prefetch" href="https://prod.spline.design" />
    <!-- Preconnect to Firebase Auth, Firestore, and Cloudinary to optimize load speed -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <script>
      // Suppress "Cannot set property fetch of #<Window> which has only a getter"
      // This happens in some sandbox environments when libraries attempt to overwrite native fetch.
      window.addEventListener('error', (event) => {
        if (event.message?.includes('Cannot set property fetch') || 
            (event.error && event.error.message?.includes('Cannot set property fetch'))) {
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
